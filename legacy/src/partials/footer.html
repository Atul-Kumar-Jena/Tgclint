<footer class="footer" data-theme="dark">
  <div class="container footer__inner">
    <div class="footer__top">
      <a class="logo footer__logo" href="{{base}}index.html" aria-label="{{brand}} — home" data-hover>{{> logo }}<span>{{brand}}</span></a>
      <p class="footer__line reveal" data-split>Exceptional glazing for those who build with vision.</p>
    </div>
    <div class="footer__grid">
      <nav class="footer__col footer__nav" aria-label="Footer">
        <p class="footer__label">Explore</p>
        <ul>{{footerNav}}</ul>
      </nav>
      <div class="footer__col footer__contact">
        <p class="footer__label">Contact</p>
        <a href="{{phoneHref}}" data-hover>{{phone}}</a>
        <a href="{{emailHref}}" data-hover>{{email}}</a>
        <address>{{address}}</address>
      </div>
      <div class="footer__col footer__social">
        <p class="footer__label">Follow</p>
        <div class="footer__socials">{{socials}}</div>
        <div class="footer__cta">{{quoteBtn}}</div>
      </div>
    </div>
    <div class="footer__base">
      <span>&copy; {{year}} {{brand}}. All rights reserved.</span>
      <span class="footer__credit">Crafted with care &amp; clear glass.</span>
      <ul class="footer__legal">
        <li><a href="{{base}}index.html" data-hover>Privacy</a></li>
        <li><a href="{{base}}index.html" data-hover>Terms</a></li>
      </ul>
    </div>
  </div>
</footer>
