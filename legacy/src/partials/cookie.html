<div class="cookie glass" data-cookie hidden>
  <p class="cookie__text">We use a few cookies to understand how the site is used. No fuss.</p>
  <div class="cookie__actions">
    <button class="btn btn--mini btn--light" type="button" data-cookie-accept>Accept</button>
    <button class="btn btn--mini btn--ghost" type="button" data-cookie-deny>Deny</button>
  </div>
</div>
