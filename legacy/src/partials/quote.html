<aside class="quote" id="quote" aria-hidden="true">
  <div class="quote__scrim" data-quote-close></div>
  <div class="quote__panel" role="dialog" aria-modal="true" aria-label="Get a quote" tabindex="-1">
    <div class="quote__sidebar" aria-hidden="true"><span class="quote__sidebar-word">Glass</span></div>
    <div class="quote__content">
      <button class="quote__close" type="button" data-quote-close aria-label="Close">
        <span></span><span></span>
      </button>
      <header class="quote__head">
        <h2 class="quote__title">Get a quote</h2>
        <p class="quote__intro">Share your plans and we'll follow up with a detailed proposal.</p>
      </header>
      <form class="quote__form" data-quote-form novalidate>
        <div class="quote__field">
          <label class="quote__lead" for="q-project">Tell us about your project.</label>
          <div class="quote__grid">
            <input id="q-name" name="name" type="text" placeholder="Full name" autocomplete="name" required>
            <input id="q-email" name="email" type="email" placeholder="Email address" autocomplete="email" required>
            <input id="q-loc" name="location" type="text" placeholder="Project location" autocomplete="off">
            <input id="q-phone" name="phone" type="tel" placeholder="Phone (optional)" autocomplete="tel">
          </div>
        </div>
        <fieldset class="quote__field quote__chips">
          <legend class="quote__legend">Required services</legend>
          <label class="chip"><input type="checkbox" name="services" value="Glazing"><span>Glazing</span></label>
          <label class="chip"><input type="checkbox" name="services" value="Support &amp; aftercare"><span>Support &amp; aftercare</span></label>
          <label class="chip"><input type="checkbox" name="services" value="Other"><span>Other</span></label>
        </fieldset>
        <div class="quote__field">
          <label class="quote__legend" for="q-project">How can we help?</label>
          <textarea id="q-project" name="message" rows="5" placeholder="A few words about the build, the timeline and the vision&hellip;"></textarea>
        </div>
        <div class="quote__submit">
          <button class="btn btn--dark" type="submit" data-hover>
            <span class="btn__icon" aria-hidden="true">&#8618;</span>
            <span class="btn__labels"><span class="btn__label">Send enquiry</span><span class="btn__label" aria-hidden="true">Send enquiry</span></span>
          </button>
          <p class="quote__note">We reply to every enquiry within two working days.</p>
        </div>
        <p class="quote__done" data-quote-done hidden>Thank you — your enquiry is on its way. We'll be in touch shortly.</p>
      </form>
    </div>
  </div>
</aside>
