    <nav class="endnav__links" style="--ei:1" aria-label="End of page">{{endnavLinks}}</nav>
    <div class="endnav__cta" style="--ei:2">{{quoteBtnLight}}</div>
    <div class="endnav__foot" style="--ei:3">

      <div class="endnav__socials">{{socials}}</div>
    </div>
  </div>
