{{> head }}

<main id="main">

  <section class="section lede" data-theme="light" style="padding-top:clamp(8rem,18vh,14rem)">
    <div class="container">
      <p class="eyebrow">News &amp; journal</p>
      <h1 class="lede__title" data-split>Notes from the studio —<br>craft, projects and glass.</h1>
    </div>
  </section>

  <section class="section" data-theme="light">
    <div class="container">
      <div class="news-list"><!-- @NEWS_LIST --></div>
    </div>
  </section>

  <section class="section cta" data-theme="light">
    <div class="container">
      <h2 class="cta__title" data-split>Where vision meets<br>execution</h2>
      <div class="cta__buttons reveal">
        <!-- @BTN_CONTACT -->
        {{quoteBtnDark}}
      </div>
    </div>
    <div class="cta__reveal" data-pavilion>
        <div class="cta__pin"><!-- @PAVILION --></div>
      </div>
  </section>

</main>

{{> foot }}
