name: Build & publish to gh-pages

# Pages is served from the `gh-pages` branch. This workflow rebuilds the static
# site on every push and force-publishes dist/ to gh-pages using the built-in
# GITHUB_TOKEN (which can push branches) — no Pages REST enablement required.

on:
  push:
    branches: ["claude/sweet-dirac-7gij9", "main"]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: publish-gh-pages
  cancel-in-progress: true

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Build site
        run: node build.mjs

      - name: Smoke test (no broken links / hooks)
        run: node tools/smoke.mjs

      - name: Publish dist/ to gh-pages
        run: |
          cd dist
          touch .nojekyll
          git init -q
          git checkout -q -b gh-pages
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -q -m "Deploy ${GITHUB_SHA::7}"
          git push -f "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" gh-pages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
