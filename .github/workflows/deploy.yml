name: Build (Nuxt) & publish to gh-pages

# The build sandbox has no network, but GitHub runners do — so Nuxt + GSAP + Lenis
# are installed and `nuxt generate`d here, then the static output is published to the
# gh-pages branch (the repo's existing Pages source).

on:
  push:
    branches: ["claude/sweet-dirac-7gij9", "main"]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: publish-gh-pages
  cancel-in-progress: true

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Generate static site
        run: npm run generate
        env:
          NITRO_PRESET: github_pages

      - name: Publish .output/public to gh-pages
        run: |
          cd .output/public
          touch .nojekyll
          git init -q
          git checkout -q -b gh-pages
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -q -m "Deploy ${GITHUB_SHA::7} (nuxt)"
          git push -f "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" gh-pages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
