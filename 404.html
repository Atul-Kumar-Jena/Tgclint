<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Page moved — Saansud Infra</title>
<meta name="robots" content="noindex">
<meta name="theme-color" content="#0B102C">
<style>
  body{
    margin:0; min-height:100svh; display:grid; place-items:center;
    font-family:"Space Grotesk","Inter",system-ui,sans-serif;
    color:#fff; text-align:center; padding:24px;
    background:radial-gradient(120% 90% at 78% -10%, #2A3F86 0%, transparent 50%),
               linear-gradient(165deg, #1A2658 0%, #1C2B60 36%, #131C49 72%, #0B102C 100%);
  }
  .card{
    max-width:520px; padding:48px 40px; border-radius:28px;
    background:linear-gradient(150deg, rgba(28,40,86,.64), rgba(13,18,46,.46));
    -webkit-backdrop-filter:blur(22px); backdrop-filter:blur(22px);
    border:1px solid rgba(255,255,255,.16);
    box-shadow:0 30px 80px -20px rgba(2,5,20,.55), inset 0 1px 0 rgba(255,255,255,.2);
  }
  b{ display:block; font-size:.72rem; letter-spacing:.4em; color:#FF8A4D; margin-bottom:18px; }
  h1{ font-size:clamp(1.6rem,5vw,2.2rem); margin:0 0 12px; letter-spacing:-.015em; }
  p{ color:rgba(255,255,255,.72); line-height:1.7; margin:0 0 28px; font-family:"Inter",system-ui,sans-serif; }
  a{
    display:inline-block; color:#fff; text-decoration:none; font-weight:600;
    padding:14px 30px; border-radius:999px;
    background:linear-gradient(140deg, #FF8A4D, #F1530E 55%, #D8430A);
    box-shadow:0 16px 36px -12px rgba(241,83,14,.55), inset 0 1px 0 rgba(255,255,255,.35);
  }
</style>
</head>
<body>
<div class="card">
  <b>SAANSUD INFRA</b>
  <h1>This page has moved</h1>
  <p>The World of Saansud has a new home. Taking you there now&hellip;</p>
  <a id="home" href="/">Go to the homepage</a>
</div>
<script>
(function(){
  // project pages live under /<repo>/ on GitHub Pages, at / on a custom domain
  var seg = location.pathname.split("/").filter(Boolean);
  var base = /\.github\.io$/.test(location.hostname) && seg.length ? "/" + seg[0] + "/" : "/";
  var p = location.pathname.toLowerCase();
  var dest = "index.html";
  if (p.indexOf("project") > -1 || p.indexOf("apartment") > -1) dest = "projects.html";
  else if (p.indexOf("blog") > -1 || p.indexOf("insight") > -1 || p.indexOf("vlog") > -1) dest = "blog.html";
  else if (p.indexOf("construction") > -1) dest = "construction.html";
  else if (p.indexOf("interior") > -1) dest = "interior-solutions.html";
  else if (p.indexOf("about") > -1 || p.indexOf("leader") > -1) dest = "about.html";
  else if (p.indexOf("contact") > -1) dest = "contact.html";
  else if (p.indexOf("career") > -1) dest = "careers.html";
  var url = base + dest;
  document.getElementById("home").href = url;
  setTimeout(function(){ location.replace(url); }, 600);
})();
</script>
</body>
</html>
