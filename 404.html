<script>
/* Legacy-route rescue: the site previously ran as a Nuxt SPA with routes like
   /news/sasta-ru-hinasta-trap. Indexed links and bookmarks still point there.
   Map those paths to the current static pages so nothing dead-ends. Runs before
   paint so the redirect is invisible. Base path is /Tgclint/ on GitHub Pages. */
(function () {
  var path = location.pathname.replace(/\/+$/, "");           // strip trailing slash
  // Keep only the route after the "/Tgclint" repo base (if present).
  var idx = path.indexOf("/Tgclint");
  var route = idx >= 0 ? path.slice(idx + "/Tgclint".length) : path;
  route = route.replace(/\/+$/, "");
  var map = {
    "/news": "blog.html",
    "/news/sasta-ru-hinasta-trap": "blog-single.html",
    "/news/hidden-health-cost": "blog-smart-planning.html",
    "/news/land-into-landmark": "blog-turnkey-confidence.html",
    "/about": "about.html",
    "/approach": "about.html",
    "/contact": "contact.html",
    "/projects": "projects.html",
    "/projects/laxmi-narayan-vihar": "projects.html",
    "/projects/iit-bhubaneswar": "projects.html",
    "/projects/mne-jagatsinghpur": "projects.html",
    "/collection": "interior-solutions.html",
    "/showroom": "interior-solutions.html"
  };
  var prefix = idx >= 0 ? path.slice(0, idx + "/Tgclint".length) + "/" : "/";
  var dest = map[route];
  // Prefix match for any /news/* or /projects/* not listed explicitly.
  if (!dest) {
    if (route.indexOf("/news/") === 0) dest = "blog.html";
    else if (route.indexOf("/projects/") === 0) dest = "projects.html";
  }
  if (dest) location.replace(prefix + dest);
})();
</script>
